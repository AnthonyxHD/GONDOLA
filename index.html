<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GONDOLA - Musikfestival auf dem Säntis</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Hero Section -->
    <section class="hero">
        <!-- Zusatzinformationen oben -->
        <div class="hero-info">
            <p class="hero-subtitle">Musikfestival auf dem Säntis</p>
            <p class="hero-date">22. August 2026</p>
        </div>

        <!-- Berg-Bild (überlagert den Titel) -->
        <div class="hero-content">
            <h1 class="hero-title">GONDOLA</h1>
            <img src="images/Albula_Alps.png" alt="Albula Alps - Berg" class="mountain-image">
        </div>
    </section>

    <!-- Line-Up Section -->
    <section class="lineup">
                
        <!-- Auflistung der Artists -->
        <div class="lineup-artists">
            <!-- Headliners -->
            <div class="lineup-label">Headliners</div>
            <div class="lineup-tier lineup-tier--top">
                <div class="lineup-headliner">Charlotte de Witte</div>
            </div>
            <div class="lineup-tier">
                <div class="lineup-headliner">Fisher</div>
                <div class="lineup-headliner">Dua Lipa</div>
            </div>

            <!-- Weitere Acts -->
            <div class="lineup-divider">
                <span>✦</span>
            </div>

            <div class="lineup-label lineup-label--more">Weitere Acts</div>
            <div class="lineup-tier">
                <div class="lineup-artist">Peggy Gou</div>
                <div class="lineup-artist">Meduza</div>
                <div class="lineup-artist">Solomun</div>
            </div>
            <div class="lineup-tier">
                <div class="lineup-artist">Zara Larsson</div>
                <div class="lineup-artist">Tale Of Us</div>
            </div>

        </div>

        <!-- Hinweis zu Acts -->
        <p class="lineup-tba">& viele mehr — weitere Acts folgen bald.<br><span class="tba-pulse">★ Stay tuned ★</span></p>
    </section>




    <!-- Scroll-Hinweis Section -->
    <section class="scroll-hint">
        <h2>Erfahre mehr über GONDOLA</h2>
        <p>Scroll für weitere Informationen</p>
        <div class="scroll-arrow">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12l7 7 7-7"></path>
            </svg>
        </div>
    </section>




    <script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.transitionDelay = (entry.target.dataset.delay || 0) + 'ms';
                entry.target.classList.add('revealed');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.15 });

    document.querySelectorAll('.lineup-headliner, .lineup-artist').forEach((el, i) => {
        el.dataset.delay = i * 80;
        observer.observe(el);
    });
</script>
</body>
</html>
